<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>츠캄몬스타즈 일정표</title>
<style>
:root{--bg:#e8f5ff;--card:#fff;--line:#c7e0ff;--navy:#102b52;--blue:#2f80ed;--sky:#67c8f3;--pink:#ff5d7e;--muted:#5f779b;--soft:#f4faff;}
*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#eaf6ff,#dff1ff);font-family:system-ui,-apple-system,'Segoe UI','Noto Sans KR',sans-serif;color:var(--navy)}button,input,textarea{font:inherit}.wrap{max-width:1180px;margin:0 auto;padding:26px 28px 60px}.hero{position:relative;overflow:hidden;border-radius:30px;background:linear-gradient(135deg,#2f80ed,#69cef1);min-height:172px;padding:30px 36px;color:#fff;box-shadow:0 16px 40px rgba(36,107,184,.16)}.hero:before{content:"";position:absolute;right:-70px;top:-155px;width:370px;height:370px;border-radius:50%;background:rgba(255,255,255,.15)}.hero:after{content:"";position:absolute;left:-110px;top:-230px;width:360px;height:360px;border-radius:50%;background:rgba(255,255,255,.12)}.hero-inner{position:relative;z-index:1;display:grid;grid-template-columns:76px 1fr;gap:24px;align-items:start}.logo{width:76px;height:76px;border-radius:22px;background:#fff;display:grid;place-items:center;overflow:hidden}.logo img{width:100%;height:100%;object-fit:contain;padding:6px}.hero h1{margin:0;font-size:42px;letter-spacing:.08em;font-weight:900;line-height:1.12}.month-line{margin-top:24px;font-size:31px;font-weight:900}.nav{position:absolute;right:36px;bottom:30px;display:flex;gap:13px;z-index:2}.nav button,.save-top,.password-top{border:0;border-radius:17px;padding:13px 22px;background:rgba(255,255,255,.25);color:#fff;font-weight:900;cursor:pointer}.nav .today{background:#fff;color:#236bf0}.save-top{position:absolute;right:36px;top:30px;z-index:2;width:78px;height:34px;padding:0;border-radius:999px;background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.55);font-size:13px}.password-top{position:absolute;right:122px;top:30px;z-index:2;width:104px;height:34px;padding:0;border-radius:999px;background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.45);font-size:12px;color:#fff;font-weight:900;cursor:pointer}.nav button:hover,.save-top:hover,.password-top:hover{filter:brightness(1.05)}.main{display:flex;flex-direction:column;gap:26px;margin-top:26px}.card{background:rgba(255,255,255,.96);border:1px solid var(--line);border-radius:28px;padding:28px;box-shadow:0 18px 42px rgba(36,107,184,.08)}.card-head{display:flex;justify-content:space-between;align-items:start;gap:16px;margin-bottom:20px}.card h2{margin:0;font-size:30px;letter-spacing:.02em}.hint{font-size:14px;color:var(--muted);font-weight:800}.weekly-grid{display:grid;grid-template-columns:1fr;gap:18px}.person{border:1px solid var(--line);border-radius:24px;padding:20px;background:#fbfdff}.person-top{display:flex;justify-content:flex-start;align-items:center;margin-bottom:16px}.person-name{font-size:25px;font-weight:900}.badge{display:none}.week-days{display:grid;grid-template-columns:repeat(7,minmax(88px,1fr));gap:12px}.daybox{height:118px;border:1px solid var(--line);border-radius:18px;background:#f8fcff;padding:10px 7px;text-align:center;cursor:pointer;overflow:hidden;display:flex;flex-direction:column;align-items:center}.daybox:hover,.cal-day:hover,.text-box:hover{outline:2px solid #86bdff}.dow{font-size:13px;color:#547098;font-weight:900}.dow.sun{color:#ff5576}.dow.sat{color:#2977f1}.day-text{margin-top:8px;font-size:15px;font-weight:900;line-height:1.28;white-space:pre-wrap;word-break:keep-all;overflow:hidden;width:100%;flex:1;display:flex;align-items:flex-start;justify-content:center}.today-card .date{color:#2474f1;font-weight:900;margin-bottom:8px}.today-card h2{font-size:32px}.today-sections{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:20px}.today-block h3{font-size:16px;color:#49658c;margin:0 0 9px}.text-box{height:120px;border:1px solid var(--line);border-radius:16px;background:#f4f9ff;padding:15px 16px;font-size:17px;font-weight:850;line-height:1.45;white-space:pre-wrap;word-break:keep-all;cursor:pointer;overflow:hidden}.calendar-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.week-labels{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-bottom:10px;text-align:center;font-weight:900;color:#577197}.week-labels div:first-child{color:#ff5576}.week-labels div:last-child{color:#2977f1}.calendar{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:10px}.cal-day{height:132px;border:1px solid var(--line);border-radius:17px;background:#f9fcff;padding:11px;cursor:pointer;overflow:hidden}.cal-day.empty{visibility:hidden}.cal-day.selected{background:#fff7d7;border-color:#ffbd27}.num{font-size:18px;font-weight:900;margin-bottom:8px}.num.sun,.num.holiday{color:#ff5576}.num.sat{color:#2977f1}.cal-text{font-size:14px;font-weight:850;line-height:1.3;white-space:pre-wrap;word-break:keep-all;max-height:92px;overflow:hidden}.modal-back{position:fixed;inset:0;background:rgba(9,31,62,.38);display:none;align-items:center;justify-content:center;z-index:50;padding:20px}.modal{width:min(520px,100%);background:#fff;border:1px solid var(--line);border-radius:26px;padding:24px;box-shadow:0 30px 80px rgba(8,37,78,.28)}.modal h3{margin:0 0 14px;font-size:25px}.modal-sub{font-size:14px;font-weight:900;color:#527096;margin-bottom:12px}.modal textarea{width:100%;min-height:160px;resize:vertical;border:1px solid var(--line);border-radius:16px;padding:14px 15px;color:var(--navy);font-weight:850;line-height:1.45;background:#fbfdff}.modal input{width:100%;height:52px;border:1px solid var(--line);border-radius:16px;padding:0 15px;color:var(--navy);font-weight:850;background:#fbfdff}.modal-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:14px}.action{border:0;border-radius:15px;padding:14px 18px;font-weight:900;cursor:pointer}.primary{background:#2f80ed;color:#fff}.danger{background:#ff5d7e;color:#fff}.ghost{background:#edf6ff;color:#244a7a}.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);background:#102b52;color:#fff;padding:13px 18px;border-radius:999px;font-weight:900;opacity:0;pointer-events:none;transition:.2s;z-index:80}.toast.show{opacity:1}
@media(max-width:900px){.wrap{padding:14px 12px 40px}.hero{border-radius:24px;padding:22px 20px;min-height:190px}.hero-inner{grid-template-columns:62px 1fr;gap:16px}.logo{width:62px;height:62px}.hero h1{font-size:30px;letter-spacing:.04em}.month-line{font-size:27px;margin-top:20px}.save-top{top:22px;right:20px;width:64px;height:31px}.password-top{top:58px;right:20px;width:82px;height:28px;font-size:11px}.nav{position:relative;right:auto;bottom:auto;margin-top:22px;justify-content:flex-end}.nav button{padding:11px 16px}.card{padding:20px;border-radius:24px}.weekly-grid,.today-sections{grid-template-columns:1fr}.week-days{gap:6px}.daybox{height:96px;padding:8px 4px}.day-text{font-size:12px}.calendar{gap:6px}.cal-day{height:106px;padding:8px}.cal-text{font-size:12px;max-height:72px}.card h2{font-size:25px}}


/* ===== mobile no-horizontal-scroll tuning ===== */
html,body{max-width:100%;overflow-x:hidden}
@media(max-width:640px){
  .wrap{width:100%;padding:10px 8px 32px;overflow:hidden}
  .hero{min-height:132px;border-radius:20px;padding:18px 14px 16px}
  .hero:before{width:260px;height:260px;right:-92px;top:-105px}.hero:after{width:250px;height:250px;left:-100px;top:-165px}
  .hero-inner{grid-template-columns:50px minmax(0,1fr);gap:10px;align-items:start;padding-right:52px}
  .logo{width:50px;height:50px;border-radius:16px}.logo img{padding:5px}
  .hero h1{font-size:25px;line-height:1.12;letter-spacing:.01em;max-width:none;word-break:keep-all}
  .month-line{font-size:24px;margin-top:14px}
  .save-top{right:14px;top:18px;width:50px;height:28px;font-size:12px;background:rgba(255,255,255,.24)}.password-top{right:14px;top:50px;width:78px;height:25px;font-size:10px;background:rgba(255,255,255,.18)}
  .nav{position:relative;right:auto;bottom:auto;margin-top:14px;justify-content:flex-end;gap:8px}
  .nav button{min-width:58px;padding:9px 8px;border-radius:15px;font-size:12px}
  .main{gap:16px;margin-top:16px}
  .card{border-radius:22px;padding:18px 14px;overflow:hidden}
  .card-head,.calendar-head{align-items:flex-start;gap:8px;margin-bottom:14px}
  .card h2{font-size:25px;line-height:1.22;word-break:keep-all}
  .hint{font-size:12px;line-height:1.25;max-width:102px;text-align:right}
  .weekly-grid{grid-template-columns:1fr;gap:14px}
  .person{padding:14px;border-radius:19px;overflow:hidden}
  .person-top{margin-bottom:12px}.person-name{font-size:23px}.badge{font-size:12px;padding:6px 10px}
  .week-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px;overflow:visible;padding-bottom:0}
  .daybox{min-width:0;height:74px;padding:8px 2px;border-radius:14px;overflow:hidden}
  .dow{font-size:11px}.day-text{margin-top:6px;font-size:11px;line-height:1.18;letter-spacing:-.05em;overflow-wrap:anywhere;word-break:break-all}
  .today-card .date{font-size:15px}.today-card h2{font-size:28px}
  .today-sections{grid-template-columns:1fr;gap:14px;margin-top:16px}
  .today-block h3{font-size:14px}.text-box{min-height:94px;font-size:15px;padding:13px;border-radius:15px}
  .calendar-card{overflow:hidden;padding-bottom:18px}
  .calendar-head,.week-labels,.calendar{min-width:0;width:100%}
  .week-labels{grid-template-columns:repeat(7,minmax(0,1fr));gap:4px;font-size:13px;margin-bottom:8px}
  .calendar{grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}
  .cal-day{height:78px;padding:6px 4px;border-radius:13px;overflow:hidden}
  .num{font-size:15px;margin-bottom:4px}.cal-text{font-size:9.5px;line-height:1.15;max-height:50px;overflow:hidden;letter-spacing:-.05em;overflow-wrap:anywhere;word-break:break-all}
  .modal-back{padding:14px}.modal{border-radius:22px;padding:20px}.modal h3{font-size:22px}.modal-actions{grid-template-columns:1fr;gap:8px}
}
@media(max-width:380px){
  .wrap{padding-left:6px;padding-right:6px}.hero{padding-left:12px;padding-right:12px}.hero-inner{grid-template-columns:46px minmax(0,1fr);gap:9px;padding-right:48px}.logo{width:46px;height:46px}.hero h1{font-size:22px}.month-line{font-size:22px}.nav button{min-width:52px;font-size:11px;padding:8px 6px}.card{padding:16px 12px}.card h2{font-size:23px}.person{padding:12px}.week-days{gap:4px}.daybox{height:70px;padding:7px 1px}.dow{font-size:10px}.day-text{font-size:10px}.calendar{gap:4px}.cal-day{height:72px;padding:5px 3px}.num{font-size:14px}.cal-text{font-size:9px;max-height:46px}
}
</style>
</head>
<body>
<div class="wrap">
<header class="hero">
  <button class="password-top" id="changePasswordBtn">비밀번호 변경</button>
  <button class="save-top" id="saveBtn">저장</button>
  <div class="hero-inner">
    <div class="logo"><img src="https://stimg.sooplive.com/NORMAL_BBS/5/19145025/979469cfcdc662e18.gif" alt="츠캄 로고"></div>
    <div><h1>츠캄몬스타즈 일정표</h1><div id="heroMonth" class="month-line">2026년 4월</div></div>
  </div>
  <div class="nav"><button id="prevBtn">‹ 이전</button><button class="today" id="todayBtn">오늘</button><button id="nextBtn">다음 ›</button></div>
</header>
<main class="main">
  <section class="card weekly-card">
    <div class="card-head"><h2>김윤환 · 이경민 주간 스케줄</h2></div>
    <div class="weekly-grid" id="weeklyGrid"></div>
  </section>
  <section class="card today-card">
    <div class="date" id="todayDate">2026.04.27</div><h2>오늘의 일정</h2>
    <div class="today-sections">
      <div class="today-block"><h3>오늘의 일정</h3><div class="text-box" id="todaySchedule" data-edit="todaySchedule">등록된 일정 없음</div></div>
      <div class="today-block"><h3>언급노(휴방)</h3><div class="text-box" id="todayMention" data-edit="todayMention">등록된 언급노(휴방) 없음</div></div>
    </div>
  </section>
  <section class="card calendar-card">
    <div class="calendar-head"><h2 id="calendarTitle">월간 일정표 (2026년 4월)</h2></div>
    <div class="week-labels"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
    <div class="calendar" id="calendar"></div>
  </section>
</main>
</div>
<div class="modal-back" id="modalBack">
  <div class="modal">
    <h3 id="modalTitle">입력/수정</h3>
    <div class="modal-sub" id="modalSub"></div>
    <textarea id="modalText" placeholder="표시할 텍스트를 입력하세요"></textarea>
    <div class="modal-actions"><button class="action ghost" id="cancelBtn">취소</button><button class="action danger" id="clearBtn">비우기</button><button class="action primary" id="applyBtn">적용</button></div>
  </div>
</div>
<div class="modal-back" id="passwordBack">
  <div class="modal">
    <h3>관리자 저장</h3>
    <div class="modal-sub">비밀번호를 입력하면 현재 일정이 저장됩니다.</div>
    <input id="adminPassword" type="password" placeholder="관리자 비밀번호" autocomplete="current-password" />
    <div class="modal-actions" style="grid-template-columns:1fr 1fr;margin-top:14px"><button class="action ghost" id="passwordCancelBtn">취소</button><button class="action primary" id="passwordSaveBtn">저장</button></div>
  </div>
</div>

<div class="modal-back" id="changePasswordBack">
  <div class="modal">
    <h3>비밀번호 변경</h3>
    <div class="modal-sub">현재 비밀번호 확인 후 새 비밀번호로 변경합니다.</div>
    <input id="currentPassword" type="password" placeholder="현재 비밀번호" autocomplete="current-password" style="margin-bottom:10px" />
    <input id="newPassword" type="password" placeholder="새 비밀번호" autocomplete="new-password" style="margin-bottom:10px" />
    <input id="newPasswordConfirm" type="password" placeholder="새 비밀번호 확인" autocomplete="new-password" />
    <div class="modal-actions" style="grid-template-columns:1fr 1fr;margin-top:14px"><button class="action ghost" id="changePasswordCancelBtn">취소</button><button class="action primary" id="changePasswordApplyBtn">변경</button></div>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const dows=['일','월','화','수','목','금','토'];
const todayReal=new Date();
let view=new Date(todayReal.getFullYear(),todayReal.getMonth(),1);
let selectedDate=dateKey(todayReal.getFullYear(),todayReal.getMonth()+1,todayReal.getDate());
let editCtx=null;
const DEFAULT_DATA={weekly:{kim:['방송','방송','휴방','방송','콘텐츠','방송','이벤트'],lee:['방송','휴방','방송','방송','콘텐츠','방송','방송']},today:{schedule:'',mention:''},monthly:{}};
function cloneObj(obj){return JSON.parse(JSON.stringify(obj));}
let data=cloneObj(DEFAULT_DATA);
const $=id=>document.getElementById(id);
const heroMonth=$('heroMonth'), calendarTitle=$('calendarTitle'), weeklyGrid=$('weeklyGrid'), todayDate=$('todayDate'), todaySchedule=$('todaySchedule'), todayMention=$('todayMention'), calendar=$('calendar');
const modalBack=$('modalBack'), modalTitle=$('modalTitle'), modalSub=$('modalSub'), modalText=$('modalText'), cancelBtn=$('cancelBtn'), clearBtn=$('clearBtn'), applyBtn=$('applyBtn');
const passwordBack=$('passwordBack'), adminPassword=$('adminPassword'), passwordCancelBtn=$('passwordCancelBtn'), passwordSaveBtn=$('passwordSaveBtn');
const changePasswordBtn=$('changePasswordBtn'), saveBtn=$('saveBtn'), prevBtn=$('prevBtn'), todayBtn=$('todayBtn'), nextBtn=$('nextBtn');
const changePasswordBack=$('changePasswordBack'), currentPassword=$('currentPassword'), newPassword=$('newPassword'), newPasswordConfirm=$('newPasswordConfirm'), changePasswordCancelBtn=$('changePasswordCancelBtn'), changePasswordApplyBtn=$('changePasswordApplyBtn');
function pad(n){return String(n).padStart(2,'0')}
function dateKey(y,m,d){return `${y}-${pad(m)}-${pad(d)}`}
function dot(k){return k.replaceAll('-','.')}
function esc(s=''){return String(s).replace(/[&<>]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]))}
function cleanLoaded(raw){
  const src=raw && raw.data ? raw.data : raw;
  return {
    weekly:{
      kim:Array.isArray(src?.weekly?.kim)?src.weekly.kim.slice(0,7):cloneObj(DEFAULT_DATA.weekly.kim),
      lee:Array.isArray(src?.weekly?.lee)?src.weekly.lee.slice(0,7):cloneObj(DEFAULT_DATA.weekly.lee)
    },
    today:{schedule:src?.today?.schedule||'',mention:src?.today?.mention||''},
    monthly:src?.monthly && typeof src.monthly==='object'?src.monthly:{}
  };
}
async function loadSchedule(){
  try{
    const res=await fetch('/data/schedule.json?ts='+Date.now(),{cache:'no-store'});
    if(res.ok){data=cleanLoaded(await res.json());}
  }catch(e){
    try{const saved=localStorage.getItem('tskamScheduleDataFinal');if(saved)data=cleanLoaded(JSON.parse(saved));}catch(_e){}
  }
  renderAll();
}
function isKoreanNationalDay(m,d,y=view.getFullYear()){
  const md=`${pad(m)}-${pad(d)}`;
  const fixed=['01-01','03-01','05-05','06-06','07-17','08-15','10-03','10-09','12-25'];
  const byYear={2026:['02-16','02-17','02-18','05-24','09-24','09-25','09-26'],2027:['02-06','02-07','02-08','05-13','09-14','09-15','09-16'],2028:['01-26','01-27','01-28','05-02','10-02','10-03','10-04']};
  return fixed.includes(md) || (byYear[y]||[]).includes(md);
}
function showToast(t){const el=document.getElementById('toast');el.textContent=t;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),1700)}
function renderHeader(){const label=view.getFullYear()+"년 "+(view.getMonth()+1)+"월";heroMonth.textContent=label;if(calendarTitle)calendarTitle.textContent="월간 일정표 ("+label+")";}
function renderWeekly(){weeklyGrid.innerHTML='';[['kim','김윤환'],['lee','이경민']].forEach(([id,name])=>{const p=document.createElement('div');p.className='person';p.innerHTML=`<div class="person-top"><div class="person-name">${name}</div></div><div class="week-days">${dows.map((d,i)=>{const cls=i===0?'sun':i===6?'sat':'';return `<div class="daybox" data-person="${id}" data-day="${i}"><div class="dow ${cls}">${d}</div><div class="day-text fit-text">${esc(data.weekly[id][i]||'')}</div></div>`}).join('')}</div>`;weeklyGrid.appendChild(p)});document.querySelectorAll('.daybox').forEach(el=>el.onclick=()=>openModal({type:'weekly',person:el.dataset.person,day:Number(el.dataset.day)}));}
function renderToday(){todayDate.textContent=dot(selectedDate);todaySchedule.textContent=data.today.schedule||'등록된 일정 없음';todayMention.textContent=data.today.mention||'등록된 언급노(휴방) 없음'}
function renderCalendar(){renderHeader();calendar.innerHTML='';const y=view.getFullYear(),m=view.getMonth()+1;const first=new Date(y,m-1,1).getDay();const last=new Date(y,m,0).getDate();for(let i=0;i<first;i++){const e=document.createElement('div');e.className='cal-day empty';calendar.appendChild(e)}for(let d=1;d<=last;d++){const k=dateKey(y,m,d);const dow=new Date(y,m-1,d).getDay();const numCls=isKoreanNationalDay(m,d,y)?'holiday':dow===0?'sun':dow===6?'sat':'';const el=document.createElement('div');el.className='cal-day'+(k===selectedDate?' selected':'');el.innerHTML=`<div class="num ${numCls}">${d}</div><div class="cal-text fit-text">${esc(data.monthly[k]||'')}</div>`;el.onclick=()=>{selectedDate=k;renderToday();renderCalendar();openModal({type:'monthly',date:k});};calendar.appendChild(el)}requestAnimationFrame(autoFitTexts)}
function autoFitTexts(){document.querySelectorAll('.fit-text,.text-box').forEach(el=>{let base=el.classList.contains('cal-text')?14:el.classList.contains('day-text')?15:17;let min=8;if(window.matchMedia('(max-width:640px)').matches){base=el.classList.contains('cal-text')?9.5:el.classList.contains('day-text')?11:15;min=el.classList.contains('day-text')?7:8}let size=base;el.style.fontSize=size+'px';el.style.lineHeight=el.classList.contains('cal-text')?'1.18':el.classList.contains('day-text')?'1.13':'1.35';el.style.wordBreak=el.classList.contains('day-text')?'break-all':'keep-all';while((el.scrollHeight>el.clientHeight || el.scrollWidth>el.clientWidth) && size>min){size-=0.5;el.style.fontSize=size+'px';}if(el.classList.contains('day-text') && (el.scrollHeight>el.clientHeight || el.scrollWidth>el.clientWidth)){el.style.wordBreak='break-all';el.style.overflowWrap='anywhere';}})}
function renderAll(){renderWeekly();renderToday();renderCalendar();requestAnimationFrame(autoFitTexts)}
function openModal(ctx){editCtx=ctx;let title='입력/수정',sub='',val='';if(ctx.type==='weekly'){const name=ctx.person==='kim'?'김윤환':'이경민';title='주간 스케줄 수정';sub=`${name} · ${dows[ctx.day]}요일`;val=data.weekly[ctx.person][ctx.day]||''}if(ctx.type==='todaySchedule'){title='오늘의 일정 수정';sub='오늘의 일정';val=data.today.schedule||''}if(ctx.type==='todayMention'){title='언급노(휴방) 수정';sub='언급노(휴방)';val=data.today.mention||''}if(ctx.type==='monthly'){title='월간 일정 수정';sub=dot(ctx.date);val=data.monthly[ctx.date]||''}modalTitle.textContent=title;modalSub.textContent=sub;modalText.value=val;modalBack.style.display='flex';setTimeout(()=>modalText.focus(),50)}
function closeModal(){modalBack.style.display='none';editCtx=null}
function applyModal(clear=false){if(!editCtx)return;const v=clear?'':modalText.value.trim();if(editCtx.type==='weekly')data.weekly[editCtx.person][editCtx.day]=v;if(editCtx.type==='todaySchedule')data.today.schedule=v;if(editCtx.type==='todayMention')data.today.mention=v;if(editCtx.type==='monthly'){if(v)data.monthly[editCtx.date]=v;else delete data.monthly[editCtx.date]}renderAll();closeModal();showToast(clear?'비움 완료':'수정 완료')}
async function saveToServer(password,newPassword=''){
  const payload={password,data};
  if(newPassword)payload.newPassword=newPassword;
  const res=await fetch('/.netlify/functions/save-schedule',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
  const json=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(json.error||'저장 실패');
  localStorage.setItem('tskamScheduleDataFinal',JSON.stringify(data));
  return json;
}
todaySchedule.onclick=()=>openModal({type:'todaySchedule'});todayMention.onclick=()=>openModal({type:'todayMention'});cancelBtn.onclick=closeModal;applyBtn.onclick=()=>applyModal(false);clearBtn.onclick=()=>applyModal(true);modalBack.onclick=e=>{if(e.target===modalBack)closeModal()};
prevBtn.onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()-1,1);renderCalendar()};nextBtn.onclick=()=>{view=new Date(view.getFullYear(),view.getMonth()+1,1);renderCalendar()};todayBtn.onclick=()=>{view=new Date(todayReal.getFullYear(),todayReal.getMonth(),1);selectedDate=dateKey(todayReal.getFullYear(),todayReal.getMonth()+1,todayReal.getDate());renderAll()};
saveBtn.onclick=()=>{passwordBack.style.display='flex';adminPassword.value='';setTimeout(()=>adminPassword.focus(),50)};passwordCancelBtn.onclick=()=>passwordBack.style.display='none';passwordBack.onclick=e=>{if(e.target===passwordBack)passwordBack.style.display='none'};async function doProtectedSave(){try{passwordSaveBtn.disabled=true;passwordSaveBtn.textContent='저장 중';await saveToServer(adminPassword.value);passwordBack.style.display='none';showToast('저장 완료')}catch(e){showToast(e.message)}finally{passwordSaveBtn.disabled=false;passwordSaveBtn.textContent='저장'}}passwordSaveBtn.onclick=doProtectedSave;adminPassword.addEventListener('keydown',e=>{if(e.key==='Enter')doProtectedSave()});
changePasswordBtn.onclick=()=>{changePasswordBack.style.display='flex';currentPassword.value='';newPassword.value='';newPasswordConfirm.value='';setTimeout(()=>currentPassword.focus(),50)};
changePasswordCancelBtn.onclick=()=>changePasswordBack.style.display='none';changePasswordBack.onclick=e=>{if(e.target===changePasswordBack)changePasswordBack.style.display='none'};
async function doChangePassword(){const cur=currentPassword.value;const next=newPassword.value.trim();const confirm=newPasswordConfirm.value.trim();if(!next){showToast('새 비밀번호를 입력하세요');return}if(next.length<4){showToast('비밀번호는 4자 이상');return}if(next!==confirm){showToast('새 비밀번호가 일치하지 않습니다');return}try{changePasswordApplyBtn.disabled=true;changePasswordApplyBtn.textContent='변경 중';await saveToServer(cur,next);changePasswordBack.style.display='none';showToast('비밀번호 변경 완료')}catch(e){showToast(e.message)}finally{changePasswordApplyBtn.disabled=false;changePasswordApplyBtn.textContent='변경'}}
changePasswordApplyBtn.onclick=doChangePassword;[currentPassword,newPassword,newPasswordConfirm].forEach(el=>el.addEventListener('keydown',e=>{if(e.key==='Enter')doChangePassword()}));
loadSchedule();
</script>
